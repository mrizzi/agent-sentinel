# Scheduled audit catches newly disclosed vulnerabilities in existing
# dependencies, even when no code changes are being made.
name: Security Audit

on:
  schedule:
    - cron: "0 0 * * 0" # Midnight UTC every Sunday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: security-audit
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      - run: cargo audit
      - run: cargo deny check
