# Early warning for upcoming Rust nightly breakage.
# Failures here are informational and do not block PRs or releases.
# Configure GitHub notification settings to receive alerts on failure.
name: Nightly

on:
  schedule:
    - cron: "0 2 * * *" # 2 AM UTC daily
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  nightly:
    name: Test (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly
      - run: cargo test --locked --all-targets
