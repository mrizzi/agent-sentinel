# Deny known vulnerabilities; check all crates for unmaintained/yanked status
[advisories]
vulnerability = "deny"
unmaintained = "workspace"
yanked = "warn"

# Only allow permissive licenses compatible with Apache-2.0.
# Copyleft licenses (GPL, AGPL, etc.) are denied to avoid
# distribution obligations that conflict with this project's license.
[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
]
copyleft = "deny"

# Deny wildcard version requirements (e.g., dep = "*") to ensure
# reproducible builds. Warn on duplicate versions to track bloat.
[bans]
multiple-versions = "warn"
wildcards = "deny"

# Only allow crates from crates.io; no unknown registries or git deps
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
    "https://index.crates.io",
]
allow-git = []
