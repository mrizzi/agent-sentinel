# Advisories: all known vulnerabilities are denied by default.
# Use `ignore` to suppress specific advisories if needed.
[advisories]

# Only allow permissive licenses compatible with Apache-2.0.
# Any license not in this list is denied.
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
]

# Warn on duplicate versions to track bloat.
# Wildcards allowed because git deps (symref) lack a version field.
# Revert to "deny" when symref moves to crates.io.
[bans]
multiple-versions = "warn"
wildcards = "allow"

# Only allow crates from crates.io; no unknown registries or git deps.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
    "https://index.crates.io",
]
allow-git = [
    "https://github.com/mrizzi/symref.git",
]
